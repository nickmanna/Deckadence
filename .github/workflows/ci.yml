name: CI

# Runs on every push and PR. Only validates the build (lint/build/test) -
# no deploy and no real secrets, so this is safe to run on fork PRs too.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deckadence
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: deckadence/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        # Placeholder values only - this just proves the build succeeds,
        # it never talks to a real Firebase project.
        env:
          REACT_APP_FIREBASE_API_KEY: ci-placeholder
          REACT_APP_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
          REACT_APP_FIREBASE_PROJECT_ID: ci-placeholder
          REACT_APP_FIREBASE_STORAGE_BUCKET: ci-placeholder.appspot.com
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          REACT_APP_FIREBASE_APP_ID: '1:000000000000:web:0000000000000000000000'
          REACT_APP_API_BASE_URL: http://localhost:5000
          CI: true
        run: npm run build

      - name: Test
        run: npm test -- --watchAll=false --passWithNoTests

  backend:
    name: Backend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile check
        run: python -m py_compile main.py trackanalysis.py

      - name: Import smoke test
        run: python -c "import main"

      - name: Build backend container (no push)
        # Validates the Dockerfile builds; the real push happens in deploy.yml.
        run: docker build -t deckadence-backend:ci .
